name: Chaser Sandbox Runner Benchmark

on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: 'Runner type to test'
        required: true
        default: 'chaser'
        type: choice
        options:
          - chaser
          - standard
          - blacksmith
          - depo
      session_id:
        description: 'Session ID'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Benchmark Chaser Sandbox as Runner
  benchmark-chaser:
    if: ${{ github.event.inputs.runner_type == 'chaser' || github.event.inputs.runner_type == '' }}
    runs-on:
      - self-hosted
      - chaser
    name: 'Chaser Runner Benchmark'
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Display runner info'
        run: |
          echo "Runner: Chaser Sandbox"
          echo "Session ID: ${{ github.event.inputs.session_id || 'dispatched' }}"
          echo "Started at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: 'Environment info'
        run: |
          echo "=== System Info ==="
          uname -a
          echo ""
          echo "=== CPU Info ==="
          if command -v sysctl &> /dev/null; then
            sysctl -n machdep.cpu.brand_string 2>/dev/null || echo "CPU info not available"
          else
            cat /proc/cpuinfo 2>/dev/null | grep "model name" | head -1 || echo "CPU info not available"
          fi
          echo ""
          echo "=== Memory ==="
          if command -v free &> /dev/null; then
            free -h
          elif command -v vm_stat &> /dev/null; then
            vm_stat
          fi
          echo ""
          echo "=== Disk ==="
          if command -v df &> /dev/null; then
            df -h .
          fi

      - name: 'Benchmark: Clone large repo'
        run: |
          echo "=== Clone Linux Kernel (1GB+) ==="
          START=$(date +%s%N)
          git clone --depth 1 https://github.com/torvalds/linux.git /tmp/linux-test 2>&1 | tail -5
          END=$(date +%s%N)
          echo "Time: $(( (END - START) / 1000000 ))ms"

      - name: 'Benchmark: Node.js operations'
        run: |
          echo "=== Node.js Operations ==="
          if command -v node &> /dev/null; then
            mkdir -p /tmp/node-test
            cd /tmp/node-test
            npm init -y > /dev/null 2>&1
            START=$(date +%s%N)
            npm install lodash express 2>&1 | tail -3
            END=$(date +%s%N)
            echo "npm install time: $(( (END - START) / 1000000 ))ms"
            node -e "const _ = require('lodash'); const start = Date.now(); for(let i = 0; i < 100000; i++) _.cloneDeep({a:1,b:{c:2}}); console.log('Lodash clone: ' + (Date.now() - start) + 'ms');"
          fi

      - name: 'Benchmark: Python operations'
        run: |
          echo "=== Python Operations ==="
          if command -v python3 &> /dev/null; then
            python3 -c "import json, time; start = time.time(); data = {'test': 'data', 'nested': {'a': 1, 'b':[1,2,3]}}; [json.dumps(data) for _ in range(100000)]; print('JSON serialization: ' + str(int((time.time() - start) * 1000)) + 'ms')"
          fi

      - name: 'Benchmark: Rust compilation'
        run: |
          echo "=== Rust Compilation ==="
          if command -v cargo &> /dev/null; then
            cd /tmp
            rm -rf rust-test
            cargo new rust-test > /dev/null 2>&1
            cd rust-test
            echo 'serde = { version = "1.0", features = ["derive"] }' >> Cargo.toml
            echo 'serde_json = "1.0"' >> Cargo.toml
            START=$(date +%s%N)
            cargo build --release 2>&1 | tail -5
            END=$(date +%s%N)
            echo "Cargo build time: $(( (END - START) / 1000000 ))ms"
          fi

      - name: 'Benchmark: File I/O'
        run: |
          echo "=== File I/O Benchmark ==="
          START=$(date +%s%N)
          dd if=/dev/urandom of=/tmp/testfile bs=1M count=100 2>&1 | tail -1
          END=$(date +%s%N)
          echo "Write 100MB: $(( (END - START) / 1000000 ))ms"

      - name: 'Benchmark: Network speed'
        run: |
          echo "=== Network Speed Test ==="
          START=$(date +%s%N)
          curl -s -o /dev/null https://ash-speed.hetzner.com/100MB.bin 2>&1
          END=$(date +%s%N)
          echo "Download 100MB: $(( (END - START) / 1000000 ))ms"

      - name: 'Cleanup'
        run: |
          rm -rf /tmp/linux-test /tmp/node-test /tmp/rust-test /tmp/testfile
          echo "Cleanup complete"

  benchmark-standard:
    if: ${{ github.event.inputs.runner_type == 'standard' }}
    runs-on: ubuntu-latest
    name: 'Standard Runner Benchmark'
    steps:
      - uses: actions/checkout@v4
      - name: 'Run benchmarks'
        run: "date -u +%Y-%m-%dT%H:%M:%SZ"

  benchmark-blacksmith:
    if: ${{ github.event.inputs.runner_type == 'blacksmith' }}
    runs-on:
      - self-hosted
      - blacksmith
    name: 'Blacksmith Runner Benchmark'
    steps:
      - uses: actions/checkout@v4
      - name: 'Run benchmarks'
        run: "date -u +%Y-%m-%dT%H:%M:%SZ"

  benchmark-depo:
    if: ${{ github.event.inputs.runner_type == 'depo' }}
    runs-on:
      - self-hosted
      - depo
    name: 'Depo Runner Benchmark'
    steps:
      - uses: actions/checkout@v4
      - name: 'Run benchmarks'
        run: "date -u +%Y-%m-%dT%H:%M:%SZ"

  compare-runners:
    needs:
      - benchmark-chaser
      - benchmark-standard
      - benchmark-blacksmith
      - benchmark-depo
    if: always()
    runs-on: ubuntu-latest
    name: 'Results Summary'
    steps:
      - name: 'Generate comparison report'
        run: |
          echo "=== Benchmark Results Summary ==="
          echo "Runner Type Tested: ${{ github.event.inputs.runner_type || 'chaser' }}"
          echo "Run ID: ${{ github.run_id }}"
