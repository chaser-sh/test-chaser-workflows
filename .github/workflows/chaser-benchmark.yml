name: Chaser Sandbox Runner Benchmark

on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: 'Runner type to test'
        required: true
        default: 'all'
        type: choice
        options: [all, chaser, standard, blacksmith, depo]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          CHASER='{"id":"chaser","name":"Chaser 9950X","labels":["self-hosted","chaser"]}'
          STANDARD='{"id":"standard","name":"GitHub Standard","labels":"ubuntu-latest"}'
          BLACKSMITH='{"id":"blacksmith","name":"Blacksmith","labels":"blacksmith-2vcpu-ubuntu-2404"}'
          DEPO='{"id":"depo","name":"Depo","labels":"depot-ubuntu-24.04"}'
          CHOICE="${{ github.event.inputs.runner_type }}"
          if [ "$CHOICE" = "all" ]; then JSON="{\"include\":[$CHASER,$STANDARD,$BLACKSMITH,$DEPO]}"; else
          case $CHOICE in "chaser") J=$CHASER ;; "standard") J=$STANDARD ;; "blacksmith") J=$BLACKSMITH ;; "depo") J=$DEPO ;; esac
          JSON="{\"include\":[$J]}"; fi
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  run-benchmarks:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.labels }}
    name: 'Bench: ${{ matrix.name }}'
    steps:
      - name: '1. RAW CPU: Parallel Compression'
        run: |
          echo "=== Generating 500MB Data & Compressing (Multi-threaded) ==="
          # This tests raw clock speed and multi-core IPC
          START=$(date +%s%N)
          dd if=/dev/urandom bs=1M count=500 of=testdata 2>/dev/null
          tar -cf - testdata | xz -T0 -3 > testdata.xz
          END=$(date +%s%N)
          echo "XZ Compression Time: $(( (END - START) / 1000000 ))ms"

      - name: '2. RAW CPU: OpenSSL Speed'
        run: |
          echo "=== OpenSSL RSA 4096 Sign/Verify (Single Core Frequency) ==="
          openssl speed rsa4096 | grep -A 1 "verify"

      - name: '3. DISK: Random 4k Write (IOPS Test)'
        run: |
          echo "=== Small File Creation (4k Random Writes) ==="
          # This exposes the 'Overlay' bottleneck.
          START=$(date +%s%N)
          mkdir -p bench-iops && cd bench-iops
          for i in {1..5000}; do echo "data" > file_$i.txt; done
          END=$(date +%s%N)
          echo "IOPS 5000 files: $(( (END - START) / 1000000 ))ms"

      - name: '4. MEMORY: Bandwidth'
        run: |
          echo "=== Memory Copy Speed ==="
          if command -v dd &> /dev/null; then
            dd if=/dev/zero of=/dev/null bs=1M count=10000 2>&1 | tail -n 1
          fi

      - name: '5. NETWORK: Real World Git (Internal Timer)'
        run: |
          echo "=== Linux Kernel Clone (Network + I/O) ==="
          START=$(date +%s%N)
          git clone --depth 1 https://github.com/torvalds/linux.git "/tmp/linux-${{ matrix.id }}" --quiet
          END=$(date +%s%N)
          echo "ACTUAL Clone Time (Excluding Agent Lag): $(( (END - START) / 1000000 ))ms"

      - name: 'Cleanup'
        if: always()
        run: rm -rf testdata testdata.xz bench-iops "/tmp/linux-${{ matrix.id }}"
