name: Chaser Sandbox Runner Benchmark

on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: 'Runner type to test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chaser
          - standard
          - blacksmith
          - warp
      session_id:
        description: 'Session ID'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # STEP 1: Determine which runners to include in the test
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Define all possible runners
          CHASER='{"id":"chaser","name":"Chaser Sandbox","labels":["self-hosted","chaser"]}'
          STANDARD='{"id":"standard","name":"GitHub Standard","labels":"ubuntu-latest"}'
          BLACKSMITH='{"id":"blacksmith","name":"Blacksmith","labels":"blacksmith-2vcpu-ubuntu-2404"}'
          warp='{"id":"warp","name":"Warp","labels":"warp-ubuntu-latest-x64-4x"}'
          
          CHOICE="${{ github.event.inputs.runner_type }}"
          
          if [ "$CHOICE" = "all" ]; then
            JSON="{\"include\":[$CHASER,$STANDARD,$BLACKSMITH,$DEPO]}"
          elif [ "$CHOICE" = "chaser" ]; then
            JSON="{\"include\":[$CHASER]}"
          elif [ "$CHOICE" = "standard" ]; then
            JSON="{\"include\":[$STANDARD]}"
          elif [ "$CHOICE" = "blacksmith" ]; then
            JSON="{\"include\":[$BLACKSMITH]}"
          else
            JSON="{\"include\":[$DEPO]}"
          fi
          
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  # STEP 2: Run the benchmarks on the selected runners
  run-benchmarks:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    
    runs-on: ${{ matrix.labels }}
    name: 'Benchmark: ${{ matrix.name }}'
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Display runner info'
        run: |
          echo "Runner Type: ${{ matrix.name }}"
          echo "Session ID: ${{ github.event.inputs.session_id || 'dispatched' }}"
          echo "Started at: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: 'Environment info'
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== CPU Info ==="
          if command -v sysctl &> /dev/null; then
            sysctl -n machdep.cpu.brand_string 2>/dev/null || echo "CPU info not available"
          else
            cat /proc/cpuinfo 2>/dev/null | grep "model name" | head -1 || echo "CPU info not available"
          fi
          echo "=== Memory ==="
          free -h 2>/dev/null || vm_stat
          echo "=== Disk ==="
          df -h .

      - name: 'Benchmark: Clone large repo'
        run: |
          echo "=== Clone Linux Kernel (1GB+) ==="
          START=$(date +%s%N)
          # Use unique folder names to avoid collisions if runners share disk
          git clone --depth 1 https://github.com/torvalds/linux.git "/tmp/linux-test-${{ matrix.id }}" 2>&1 | tail -5
          END=$(date +%s%N)
          echo "Time: $(( (END - START) / 1000000 ))ms"

      - name: 'Benchmark: Node.js operations'
        run: |
          echo "=== Node.js Operations ==="
          if command -v node &> /dev/null; then
            mkdir -p "/tmp/node-test-${{ matrix.id }}"
            cd "/tmp/node-test-${{ matrix.id }}"
            npm init -y > /dev/null 2>&1
            START=$(date +%s%N)
            npm install lodash express 2>&1 | tail -3
            END=$(date +%s%N)
            echo "npm install time: $(( (END - START) / 1000000 ))ms"
            node -e "const _ = require('lodash'); const start = Date.now(); for(let i = 0; i < 100000; i++) _.cloneDeep({a:1,b:{c:2}}); console.log('Lodash clone: ' + (Date.now() - start) + 'ms');"
          fi

      - name: 'Benchmark: Python operations'
        run: |
          echo "=== Python Operations ==="
          if command -v python3 &> /dev/null; then
            python3 -c "import json, time; start = time.time(); data = {'test': 'data', 'nested': {'a': 1, 'b':[1,2,3]}}; [json.dumps(data) for _ in range(100000)]; print('JSON serialization: ' + str(int((time.time() - start) * 1000)) + 'ms')"
          fi

      - name: 'Benchmark: File I/O'
        run: |
          echo "=== File I/O Benchmark ==="
          START=$(date +%s%N)
          dd if=/dev/urandom of="/tmp/testfile-${{ matrix.id }}" bs=1M count=100 2>&1 | tail -1
          END=$(date +%s%N)
          echo "Write 100MB: $(( (END - START) / 1000000 ))ms"
          
          START=$(date +%s%N)
          cat "/tmp/testfile-${{ matrix.id }}" > /dev/null
          END=$(date +%s%N)
          echo "Read 100MB: $(( (END - START) / 1000000 ))ms"

      - name: 'Benchmark: Network speed'
        run: |
          echo "=== Network Speed Test ==="
          START=$(date +%s%N)
          curl -s -o /dev/null https://ash-speed.hetzner.com/100MB.bin 2>&1
          END=$(date +%s%N)
          echo "Download 100MB: $(( (END - START) / 1000000 ))ms"

      - name: 'Cleanup'
        if: always()
        run: |
          rm -rf "/tmp/linux-test-${{ matrix.id }}" "/tmp/node-test-${{ matrix.id }}" "/tmp/testfile-${{ matrix.id }}"
          echo "Cleanup complete"

  # STEP 3: Simple completion summary
  results-summary:
    needs: run-benchmarks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 'Summary'
        run: |
          echo "Benchmark Run Complete"
          echo "Mode: ${{ github.event.inputs.runner_type }}"
          echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
